name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: API contract freshness
        # Regenerate api.ts from the vendored, pinned openapi.json; a stale
        # committed copy reds the build (mirrors stellar-api's OpenAPI/ERD gates,
        # ADR-0018). Re-sync deliberately with `npm run api:sync`.
        run: npm run api:generate && git diff --exit-code src/types/api.ts
      - name: Version consistency
        # Internal version surfaces (lockfile, CHANGELOG) must match the manifest
        # — mirrors stellar-api's version:check (ADR-0018). The footer's displayed
        # version is derived at runtime from the platform (#105), so it isn't
        # gated here; this guards the remaining committed surfaces.
        run: npm run version:check
      - name: Format check
        run: npx prettier --check src
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      # Playwright E2E requires both stellar-api and stellar-ui running with
      # seeded test users. Setup is tracked separately; add here once ready.

  publish:
    needs: [test]
    # This workflow's history lives in both the obrien-k fork and the canonical
    # orphic-inc repo (same file, same commits). Gate on repository rather than
    # deleting the job, so it fires in the canonical context and no-ops on the
    # fork's own CI runs — restores the publish path stripped by 51d7314, which
    # dropped it entirely to avoid the fork publishing under its own namespace.
    if: github.repository == 'orphic-inc/stellar-ui' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
