name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: API contract freshness
        # Regenerate api.ts from the vendored, pinned openapi.json; a stale
        # committed copy reds the build (mirrors stellar-api's OpenAPI/ERD gates,
        # ADR-0018). Re-sync deliberately with `npm run api:sync`.
        run: npm run api:generate && git diff --exit-code src/types/api.ts
      - name: Format check
        run: npx prettier --check src
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      # Playwright E2E requires both stellar-api and stellar-ui running with
      # seeded test users. Setup is tracked separately; add here once ready.
